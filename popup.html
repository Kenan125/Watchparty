<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchParty</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <div class="brand">
      <span class="brand-mark">WP</span>
      <h1>Crunchyroll WatchParty</h1>
    </div>
    <p class="subtitle">Sync playback, chat, and activity logs.</p>

    <div class="relay-row">
      <span id="relayDot" class="dot dot-off"></span>
      <span id="relayStatus">Relay: Checking...</span>
      <span id="relayUsers" class="relay-users"></span>
    </div>

    <label for="username">Username (optional)</label>
    <div class="username-row">
      <input id="username" type="text" placeholder="Auto guest name" maxlength="24" />
      <button id="randomNameBtn" type="button" class="secondary slim">Random</button>
    </div>

    <label for="inviteCode">Invite Link</label>
    <div class="invite-row">
      <input id="inviteCode" type="text" placeholder="Click 'Create Room' to generate" readonly />
      <button id="copyInviteBtn" type="button" class="secondary slim">Copy</button>
    </div>

    <div class="buttons">
      <button id="connectBtn" class="primary">Create Room</button>
      <button id="disconnectBtn" class="secondary">Disconnect</button>
    </div>

    <p id="status" class="status">Open a Crunchyroll episode tab to start.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
