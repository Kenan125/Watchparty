<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchParty</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <div class="brand">
      <span class="brand-mark">WP</span>
      <h1>Crunchyroll WatchParty</h1>
    </div>
    <p class="subtitle">Sync playback, chat, and activity logs.</p>

    <label for="serverUrl">Relay Server URL</label>
    <input id="serverUrl" type="text" placeholder="ws://localhost:8787" />

    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Your name" maxlength="24" />

    <label for="room">Party Room</label>
    <input id="room" type="text" placeholder="anime-night" maxlength="40" />

    <label for="roomPassword">Room Password (optional)</label>
    <input id="roomPassword" type="password" placeholder="set a shared password" maxlength="64" />

    <label for="inviteCode">Invite Code</label>
    <div class="invite-row">
      <input id="inviteCode" type="text" placeholder="wp1:..." />
      <button id="copyInviteBtn" type="button" class="secondary slim">Copy</button>
      <button id="applyInviteBtn" type="button" class="secondary slim">Apply</button>
    </div>

    <div class="buttons">
      <button id="connectBtn" class="primary">Connect</button>
      <button id="disconnectBtn" class="secondary">Disconnect</button>
    </div>

    <p id="status" class="status">Not connected.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
